# 先用 HTTP（无证书）— 配置好 Nginx 后可直接访问 http://teumu.online
# 复制: cp deploy/nginx-teumu.online-http.conf /etc/nginx/sites-available/teumu.online

server {
    listen 80;
    listen [::]:80;
    server_name teumu.online www.teumu.online 160.30.4.98;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location /hero/ {
        alias /var/www/iphone-store/public/hero/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /prizes/ {
        alias /var/www/iphone-store/public/prizes/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /uploads/ {
        alias /var/www/iphone-store/public/uploads/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location /payments/ {
        alias /var/www/iphone-store/public/payments/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
