# teumu.online — 复制到 /etc/nginx/sites-available/iphone-store

server {
    listen 80;
    listen [::]:80;
    server_name teumu.online www.teumu.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name teumu.online www.teumu.online;

    # certbot 申请后会自动写入，首次可先注释 ssl 两行，只跑 80 申请证书
    ssl_certificate     /etc/letsencrypt/live/teumu.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teumu.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location /hero/ {
        alias /var/www/iphone-store/public/hero/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /prizes/ {
        alias /var/www/iphone-store/public/prizes/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /uploads/ {
        alias /var/www/iphone-store/public/uploads/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location /payments/ {
        alias /var/www/iphone-store/public/payments/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
