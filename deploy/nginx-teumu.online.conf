# teumu.online — 复制到 /etc/nginx/sites-available/iphone-store

server {
    listen 80;
    listen [::]:80;
    server_name teumu.online www.teumu.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name teumu.online www.teumu.online;

    # certbot 申请后会自动写入，首次可先注释 ssl 两行，只跑 80 申请证书
    ssl_certificate     /etc/letsencrypt/live/teumu.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teumu.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
